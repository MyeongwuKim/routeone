query SharedRouteConnection($regionCode: String, $limit: Int, $cursor: String) {
  sharedRouteConnection(
    regionCode: $regionCode
    limit: $limit
    cursor: $cursor
  ) {
    nodes {
      ...RouteSummaryFields
      stops {
        id
        place {
          contentId
          contentTypeId
          title
          address
          categoryLabel
          categoryName
          regionCode
          regionLabelKey
        }
      }
    }
    pageInfo {
      endCursor
      hasNextPage
    }
  }
}
