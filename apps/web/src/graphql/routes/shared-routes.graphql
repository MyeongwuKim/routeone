query SharedRoutes($regionCode: String, $limit: Int) {
  sharedRoutes(regionCode: $regionCode, limit: $limit) {
    ...RouteSummaryFields
    stops {
      id
      place {
        contentId
        contentTypeId
        title
        address
        categoryLabel
        categoryName
        regionCode
        regionLabelKey
      }
    }
  }
}
