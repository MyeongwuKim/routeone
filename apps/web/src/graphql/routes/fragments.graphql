fragment RoutePlaceFields on PlaceSnapshot {
  provider
  externalId
  contentId
  contentTypeId
  title
  address
  lat
  lng
  categoryLabel
  categoryName
  imageUrl
  regionCode
  regionLabelKey
}

fragment RouteStopFields on RouteStop {
  id
  routeId
  dayId
  order
  place {
    ...RoutePlaceFields
  }
  stayMinutes
  travelMinutesFromPrevious
  memo
  visitStatus
  visitedAt
  verificationStatus
  verifiedAt
  verificationPhotoImageId
  verificationPhotoUrl
  verificationLat
  verificationLng
  verificationAccuracyMeters
  checkedInAt
  checkedOutAt
  actualStayMinutes
}

fragment RouteSummaryFields on Route {
  id
  sourceRouteId
  countryCode
  primaryRegionCode
  primaryRegionLabelKey
  tripDays
  travelStartDate
  travelEndDate
  dailyStartMinutes
  scheduleEndMinutes
  status
  visibility
  totalStopCount
  completedStopCount
  likeCount
  saveCount
  startedAt
  completedAt
  sharedAt
  shareTags
  isMine
  likedByMe
  startLocation {
    lat
    lng
  }
  createdAt
  updatedAt
}

fragment RouteDetailFields on Route {
  ...RouteSummaryFields
  days {
    id
    routeId
    dayIndex
    date
    stops {
      ...RouteStopFields
    }
  }
  stops {
    ...RouteStopFields
  }
}
