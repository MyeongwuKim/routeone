name: Publish web bundle to R2

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/web/**"
      - "apps/native/app.config.ts"
      - ".github/workflows/publish-web-bundle-r2.yml"
      - "scripts/publish-web-bundle-r2.mjs"
      - "package.json"
  workflow_dispatch:
    inputs:
      channel:
        description: "Bundle channel"
        required: false
        type: choice
        options:
          - dev
          - prod
      version:
        description: "Web bundle version (optional)"
        required: false
        type: string

jobs:
  publish:
    name: Build and publish web bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve channel
        shell: bash
        env:
          REQUESTED_WEB_VERSION: ${{ inputs.version }}
          WEB_VERSION_PREFIX: ${{ vars.ROUTEONE_WEB_VERSION_PREFIX }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.channel }}" ]]; then
            CHANNEL="${{ inputs.channel }}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            CHANNEL="prod"
          else
            CHANNEL="dev"
          fi

          if [[ "${CHANNEL}" == "prod" ]]; then
            APP_VARIANT="prod"
          else
            APP_VARIANT="dev"
          fi

          if [[ -n "${REQUESTED_WEB_VERSION}" ]]; then
            WEB_VERSION="${REQUESTED_WEB_VERSION}"
          else
            WEB_VERSION_PREFIX="${WEB_VERSION_PREFIX:-1.0}"
            WEB_VERSION="${WEB_VERSION_PREFIX}.${GITHUB_RUN_NUMBER}"
          fi

          echo "APP_VARIANT=${APP_VARIANT}" >> "${GITHUB_ENV}"
          echo "ROUTEONE_WEB_BUNDLE_CHANNEL=${CHANNEL}" >> "${GITHUB_ENV}"
          echo "ROUTEONE_WEB_BUNDLE_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"
          echo "ROUTEONE_WEB_BUNDLE_VERSION=${WEB_VERSION}" >> "${GITHUB_ENV}"

      - name: Load dev R2 config
        if: ${{ !((github.event_name == 'workflow_dispatch' && inputs.channel == 'prod') || (github.event_name != 'workflow_dispatch' && github.ref_name == 'main')) }}
        env:
          SELECTED_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID_DEV }}
          SELECTED_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY_DEV }}
          SELECTED_R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME_DEV }}
          SELECTED_R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL_DEV }}
        run: |
          echo "R2_ACCESS_KEY_ID=${SELECTED_R2_ACCESS_KEY_ID}" >> "${GITHUB_ENV}"
          echo "R2_SECRET_ACCESS_KEY=${SELECTED_R2_SECRET_ACCESS_KEY}" >> "${GITHUB_ENV}"
          echo "R2_BUCKET_NAME=${SELECTED_R2_BUCKET_NAME}" >> "${GITHUB_ENV}"
          echo "R2_PUBLIC_BASE_URL=${SELECTED_R2_PUBLIC_BASE_URL}" >> "${GITHUB_ENV}"

      - name: Load prod R2 config
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.channel == 'prod') || (github.event_name != 'workflow_dispatch' && github.ref_name == 'main') }}
        env:
          SELECTED_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID_PROD }}
          SELECTED_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY_PROD }}
          SELECTED_R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME_PROD }}
          SELECTED_R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL_PROD }}
        run: |
          echo "R2_ACCESS_KEY_ID=${SELECTED_R2_ACCESS_KEY_ID}" >> "${GITHUB_ENV}"
          echo "R2_SECRET_ACCESS_KEY=${SELECTED_R2_SECRET_ACCESS_KEY}" >> "${GITHUB_ENV}"
          echo "R2_BUCKET_NAME=${SELECTED_R2_BUCKET_NAME}" >> "${GITHUB_ENV}"
          echo "R2_PUBLIC_BASE_URL=${SELECTED_R2_PUBLIC_BASE_URL}" >> "${GITHUB_ENV}"

      - name: Build web
        env:
          ROUTEONE_NATIVE_WEB_BUNDLE: "1"
        run: pnpm build:web

      - name: Export native version config
        env:
          EXPO_PUBLIC_APP_VARIANT: ${{ env.APP_VARIANT }}
          ROUTEONE_APP_VERSION: ${{ vars.ROUTEONE_APP_VERSION }}
          ROUTEONE_IOS_BUILD_NUMBER: ${{ vars.ROUTEONE_IOS_BUILD_NUMBER }}
          ROUTEONE_ANDROID_VERSION_CODE: ${{ vars.ROUTEONE_ANDROID_VERSION_CODE }}
        run: pnpm --filter native exec expo config --type public --json > native-config.json

      - name: Publish to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ROUTEONE_APP_VERSION: ${{ vars.ROUTEONE_APP_VERSION }}
          ROUTEONE_IOS_BUILD_NUMBER: ${{ vars.ROUTEONE_IOS_BUILD_NUMBER }}
          ROUTEONE_ANDROID_VERSION_CODE: ${{ vars.ROUTEONE_ANDROID_VERSION_CODE }}
          ROUTEONE_NATIVE_CONFIG_PATH: native-config.json
          ROUTEONE_WEB_BUNDLE_RETENTION: "5"
        run: pnpm publish:web-bundle:r2
